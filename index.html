<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Creator Studio</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Creator</h2>

<button id="btnDashboard">Dashboard</button>
<button id="btnImage">Image Editor</button>
<button id="btnVideo">Video Editor</button>
<button id="btnTheme">Dark Mode</button>

</div>


<!-- MAIN -->

<div class="main">

<div id="dashboard" class="page active">

<h1>Welcome Creator 👋</h1>
<p>Select tool from sidebar</p>

</div>


<div id="imagePage" class="page">

<h2>Image Editor</h2>

<div class="toolbar">

<button id="drawBtn">Draw</button>
<button id="textBtn">Add Text</button>
<button id="uploadBtn">Upload</button>
<button id="exportBtn">Export PNG</button>

</div>

<canvas id="canvas" width="800" height="450"></canvas>

</div>


<div id="videoPage" class="page">

<h2>Video Editor</h2>

<input type="file" id="videoUpload">

<br><br>

<video id="videoPlayer" width="700" controls></video>

<br><br>

<button id="playBtn">Play</button>
<button id="pauseBtn">Pause</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
