<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Creator Studio Pro</title>

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f3f4f6;
}

.dark{
background:#0f172a;
color:white;
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:240px;
background:#111827;
color:white;
padding:20px;
display:flex;
flex-direction:column;
}

.sidebar button{
margin:5px 0;
padding:10px;
border:none;
background:#1f2937;
color:white;
cursor:pointer;
border-radius:6px;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.topbar{
height:60px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid #ddd;
}

.page{display:none;padding:20px}
.page.active{display:block}

.workspace{
display:flex;
gap:10px;
}

.tools{
width:140px;
background:white;
padding:10px;
border-radius:8px;
display:flex;
flex-direction:column;
gap:6px;
}

.canvasBox{
flex:1;
background:white;
display:flex;
justify-content:center;
align-items:center;
border-radius:8px;
}

.layers{
width:200px;
background:white;
padding:10px;
border-radius:8px;
overflow:auto;
}

.templates img{
width:100%;
margin-bottom:8px;
cursor:pointer;
border-radius:6px;
}

canvas{
border:1px solid #ddd;
}

.timeline{
width:100%;
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<h2>Studio</h2>

<button onclick="openPage('dashboard')">Dashboard</button>
<button onclick="openPage('image')">Image Editor</button>
<button onclick="openPage('video')">Video Editor</button>
<button onclick="openPage('ai')">AI Generator</button>
<button onclick="googleLogin()">Google Login</button>
<button onclick="toggleTheme()">Theme</button>

</div>

<div class="main">

<div class="topbar">

<h3 id="userText">Creator Studio</h3>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="page active">

<h2>Welcome</h2>
<p>Select a tool from sidebar.</p>

</div>

<!-- IMAGE EDITOR -->

<div id="image" class="page">

<div class="workspace">

<div class="tools">

<button onclick="draw()">Draw</button>
<button onclick="addText()">Text</button>
<button onclick="addRect()">Shape</button>
<button onclick="upload()">Upload</button>
<button onclick="exportPNG()">Export</button>

</div>

<div class="canvasBox">

<canvas id="canvas" width="750" height="420"></canvas>

</div>

<div class="layers">

<h4>Templates</h4>

<div class="templates" id="templates"></div>

<h4>Layers</h4>
<ul id="layerList"></ul>

</div>

</div>

</div>

<!-- VIDEO EDITOR -->

<div id="video" class="page">

<h3>Video Editor</h3>

<input type="file" id="videoUpload">

<br><br>

<video id="videoPlayer" width="700" controls></video>

<br><br>

<label>Start Trim</label>
<input type="range" id="startTrim" min="0" max="100">

<label>End Trim</label>
<input type="range" id="endTrim" min="0" max="100">

<br><br>

<input class="timeline" type="range" id="timeline" min="0" max="100">

<br>

<button onclick="playVideo()">Play</button>
<button onclick="pauseVideo()">Pause</button>

</div>

<!-- AI -->

<div id="ai" class="page">

<h3>AI Image Generator</h3>

<input id="prompt" placeholder="Describe image">

<button onclick="generateAI()">Generate</button>

<br><br>

<img id="aiImage" width="400">

</div>

</div>
</div>

<script>

/* PAGE SWITCH */

function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* THEME */

function toggleTheme(){
document.body.classList.toggle("dark")
}

/* CANVAS */

const canvas=new fabric.Canvas("canvas")

function draw(){canvas.isDrawingMode=true}

function addText(){
const t=new fabric.IText("Text",{left:100,top:100})
canvas.add(t)
updateLayers()
}

function addRect(){
const r=new fabric.Rect({left:150,top:150,width:120,height:80,fill:"red"})
canvas.add(r)
updateLayers()
}

function upload(){

const input=document.createElement("input")
input.type="file"

input.onchange=e=>{
const reader=new FileReader()
reader.onload=f=>{
fabric.Image.fromURL(f.target.result,img=>{
img.scaleToWidth(250)
canvas.add(img)
updateLayers()
})
}
reader.readAsDataURL(e.target.files[0])
}

input.click()

}

function exportPNG(){

const link=document.createElement("a")
link.href=canvas.toDataURL()
link.download="design.png"
link.click()

}

/* TEMPLATE LIBRARY */

const templatePanel=document.getElementById("templates")

for(let i=1;i<=50;i++){

const img=document.createElement("img")
img.src="https://picsum.photos/200/120?random="+i

img.onclick=()=>{

fabric.Image.fromURL(img.src,obj=>{
obj.scaleToWidth(300)
canvas.add(obj)
updateLayers()
})

}

templatePanel.appendChild(img)

}

/* LAYERS */

function updateLayers(){

const list=document.getElementById("layerList")
list.innerHTML=""

canvas.getObjects().forEach((o,i)=>{

const li=document.createElement("li")
li.innerText=o.type+" "+i
list.appendChild(li)

})

}

canvas.on("object:added",updateLayers)

/* VIDEO */

const videoUpload=document.getElementById("videoUpload")
const videoPlayer=document.getElementById("videoPlayer")

videoUpload.onchange=function(){
videoPlayer.src=URL.createObjectURL(this.files[0])
}

document.getElementById("timeline").oninput=function(){
videoPlayer.currentTime=(videoPlayer.duration*this.value)/100
}

function playVideo(){videoPlayer.play()}
function pauseVideo(){videoPlayer.pause()}

/* AI IMAGE */

async function generateAI(){

const prompt=document.getElementById("prompt").value

const res=await fetch("https://api.openai.com/v1/images/generations",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer YOUR_OPENAI_KEY"
},

body:JSON.stringify({
model:"gpt-image-1",
prompt:prompt,
size:"1024x1024"
})

})

const data=await res.json()

document.getElementById("aiImage").src=data.data[0].url

}

/* FIREBASE LOGIN */

const firebaseConfig={

apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"

}

firebase.initializeApp(firebaseConfig)

const auth=firebase.auth()

function googleLogin(){

const provider=new firebase.auth.GoogleAuthProvider()

auth.signInWithPopup(provider).then(res=>{

document.getElementById("userText").innerText="Hi "+res.user.displayName

})

}

</script>

</body>
</html>
