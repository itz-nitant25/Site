<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ToolPilot AI</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body>

<!-- LOGIN POPUP -->
<div id="loginPopup">
  <div class="popupBox">
    <h2>Continue with Google</h2>
    <button onclick="googleLogin()">Login</button>
    <button onclick="googleLogin()">Sign Up</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">

<div class="sidebar">

<div class="profile">
<img id="profilePic" src="https://via.placeholder.com/80">
<h3 id="profileName">Guest</h3>
</div>

<button onclick="openPage('dashboard')">Dashboard</button>
<button onclick="openPage('editor')">Editor</button>
<button onclick="openPage('aiImage')">AI Image</button>
<button onclick="openPage('settings')">Settings</button>

</div>

<div class="main">

<div id="dashboard" class="page active">
<h1 id="welcomeMsg">Hi Guest</h1>
<p>Free trial mode active</p>
</div>

<div id="editor" class="page">

<h2>Design Editor</h2>

<div class="toolbar">
<button onclick="drawMode()">Draw</button>
<button onclick="addText()">Text</button>
<button onclick="uploadImage()">Upload Image</button>
<button onclick="exportPNG()">Export PNG</button>
</div>

<canvas id="canvas"></canvas>

</div>

<div id="aiImage" class="page">

<h2>AI Image Generator</h2>

<input id="imgPrompt" placeholder="Describe image">

<button onclick="generateAIImage()">Generate</button>

<div id="imageResult"></div>

</div>

<div id="settings" class="page">

<h2>Settings</h2>

<button onclick="toggleDark()">Dark Mode</button>
<button onclick="logout()">Logout</button>

</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
