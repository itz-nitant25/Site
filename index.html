<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Creator Studio</title>

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:220px;
background:#111;
color:white;
padding:20px;
display:flex;
flex-direction:column;
}

.sidebar button{
margin:6px 0;
padding:10px;
border:none;
background:#333;
color:white;
cursor:pointer;
}

.main{
flex:1;
padding:20px;
}

.page{
display:none;
}

.page.active{
display:block;
}

.toolbar button{
margin:5px;
padding:8px 15px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

canvas{
border:1px solid #ccc;
}

</style>

</head>

<body>

<div class="app">

<div class="sidebar">

<h2>Creator</h2>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('image')">Image Editor</button>
<button onclick="showPage('video')">Video Editor</button>

</div>


<div class="main">

<div id="dashboard" class="page active">

<h1>Welcome Creator 👋</h1>
<p>Select a tool from sidebar</p>

</div>


<div id="image" class="page">

<h2>Image Editor</h2>

<div class="toolbar">

<button onclick="draw()">Draw</button>
<button onclick="addText()">Add Text</button>
<button onclick="upload()">Upload Image</button>
<button onclick="exportPNG()">Export</button>

</div>

<canvas id="canvas" width="800" height="450"></canvas>

</div>


<div id="video" class="page">

<h2>Video Editor</h2>

<input type="file" id="videoUpload">

<br><br>

<video id="videoPlayer" width="700" controls></video>

<br><br>

<button onclick="playVideo()">Play</button>
<button onclick="pauseVideo()">Pause</button>

</div>

</div>

</div>


<script>

function showPage(id){

document.querySelectorAll(".page").forEach(p=>{

p.classList.remove("active")

})

document.getElementById(id).classList.add("active")

}


// CANVAS

const canvas=new fabric.Canvas("canvas")

function draw(){

canvas.isDrawingMode=true

}

function addText(){

const text=new fabric.IText("Text",{left:100,top:100})

canvas.add(text)

}

function upload(){

const input=document.createElement("input")

input.type="file"

input.onchange=e=>{

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=f=>{

fabric.Image.fromURL(f.target.result,img=>{

img.scaleToWidth(300)

canvas.add(img)

})

}

reader.readAsDataURL(file)

}

input.click()

}

function exportPNG(){

const link=document.createElement("a")

link.href=canvas.toDataURL()

link.download="design.png"

link.click()

}


// VIDEO

const videoUpload=document.getElementById("videoUpload")

const videoPlayer=document.getElementById("videoPlayer")

videoUpload.onchange=function(){

const file=this.files[0]

videoPlayer.src=URL.createObjectURL(file)

}

function playVideo(){

videoPlayer.play()

}

function pauseVideo(){

videoPlayer.pause()

}

</script>

</body>
</html>
