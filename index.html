<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Canva Lite Editor</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>

</div>

<!-- APP -->

<div id="app">

<div class="sidebar">

<h3 id="username">User</h3>

<button onclick="openPage('dashboard')">Dashboard</button>

<button onclick="openPage('imageEditor')">Image Editor</button>

<button onclick="openPage('videoEditor')">Video Editor</button>

<button onclick="openPage('captionEditor')">Caption Editor</button>

<button onclick="openPage('settings')">Settings</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="page active">

<h1 id="welcome"></h1>

<p>Create images, captions, and videos</p>

</div>

<!-- IMAGE EDITOR -->

<div id="imageEditor" class="page">

<div class="toolbar">

<button onclick="drawMode()">Draw</button>

<button onclick="addText()">Text</button>

<button onclick="uploadImage()">Upload Image</button>

<button onclick="applyFilter()">Filter</button>

<button onclick="exportPNG()">Export PNG</button>

</div>

<canvas id="canvas" width="900" height="500"></canvas>

<div id="layers"></div>

</div>

<!-- VIDEO EDITOR -->

<div id="videoEditor" class="page">

<input type="file" id="videoUpload">

<video id="videoPlayer" controls width="700"></video>

<div class="toolbar">

<button onclick="playVideo()">Play</button>

<button onclick="pauseVideo()">Pause</button>

<button onclick="addCaption()">Add Caption</button>

</div>

<div id="videoCaptions"></div>

</div>

<!-- CAPTION EDITOR -->

<div id="captionEditor" class="page">

<textarea id="captionText" rows="8" cols="50" placeholder="Write caption"></textarea>

<br>

<button onclick="copyCaption()">Copy Caption</button>

</div>

<!-- SETTINGS -->

<div id="settings" class="page">

<button onclick="toggleTheme()">Dark / Light</button>

<button onclick="logout()">Logout</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
