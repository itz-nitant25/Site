<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Creator Studio</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<h2 class="logo">Creator</h2>

<button onclick="showPage('dashboard')">🏠 Dashboard</button>
<button onclick="showPage('imageEditor')">🎨 Image Editor</button>
<button onclick="showPage('videoEditor')">🎬 Video Editor</button>
<button onclick="showPage('settings')">⚙ Settings</button>

</div>


<!-- MAIN -->

<div class="main">

<!-- TOP BAR -->

<div class="topbar">

<h3>Creator Studio</h3>

<button onclick="toggleTheme()">🌙</button>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="page active">

<div class="cards">

<div class="card" onclick="showPage('imageEditor')">

<h2>🎨 Image Editor</h2>
<p>Edit images like Canva</p>

</div>

<div class="card" onclick="showPage('videoEditor')">

<h2>🎬 Video Editor</h2>
<p>Edit videos quickly</p>

</div>

</div>

</div>


<!-- IMAGE EDITOR -->

<div id="imageEditor" class="page">

<div class="editor-toolbar">

<button onclick="enableDraw()">✏ Draw</button>

<button onclick="addText()">📝 Text</button>

<button onclick="uploadImage()">📤 Upload</button>

<button onclick="exportPNG()">⬇ Export</button>

</div>

<div class="workspace">

<canvas id="canvas" width="900" height="500"></canvas>

</div>

</div>


<!-- VIDEO EDITOR -->

<div id="videoEditor" class="page">

<div class="video-panel">

<input type="file" id="videoUpload">

<video id="videoPlayer" width="800" controls></video>

<div class="video-controls">

<button onclick="playVideo()">▶</button>
<button onclick="pauseVideo()">⏸</button>

</div>

</div>

</div>


<!-- SETTINGS -->

<div id="settings" class="page">

<h2>Settings</h2>

<button onclick="toggleTheme()">Dark / Light Mode</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
