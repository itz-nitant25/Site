<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Creator Studio</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Creator</h2>

<button onclick="openPage('dashboard')">Dashboard</button>
<button onclick="openPage('image')">Image Editor</button>
<button onclick="openPage('video')">Video Editor</button>
<button onclick="toggleTheme()">Dark Mode</button>

</div>


<!-- MAIN -->

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="page active">

<h1>Welcome Creator 👋</h1>
<p>Select tool from left panel</p>

</div>


<!-- IMAGE EDITOR -->

<div id="image" class="page">

<div class="editor">

<!-- LEFT TOOLS -->

<div class="tools">

<button onclick="drawMode()">Draw</button>

<input type="range" min="1" max="40" value="5" id="brushSize">

<button onclick="addText()">Text</button>

<button onclick="uploadImage()">Upload</button>

<button onclick="removeBG()">Remove BG</button>

<button onclick="exportPNG()">Export</button>

</div>


<!-- CANVAS -->

<div class="canvasArea">

<canvas id="canvas" width="900" height="500"></canvas>

</div>


<!-- LAYERS -->

<div class="layers">

<h3>Layers</h3>

<ul id="layerList"></ul>

</div>

</div>

</div>


<!-- VIDEO EDITOR -->

<div id="video" class="page">

<h2>Video Editor</h2>

<input type="file" id="videoUpload">

<br><br>

<video id="videoPlayer" width="800" controls></video>

<br>

<input type="range" id="timeline" min="0" max="100">

<br>

<button onclick="playVideo()">Play</button>
<button onclick="pauseVideo()">Pause</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
