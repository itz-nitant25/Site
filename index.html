<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Creator Studio Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

</head>

<body>

<div id="app">

<div class="sidebar">

<h3 id="username">Guest</h3>

<button onclick="openPage('dashboard')">Dashboard</button>
<button onclick="openPage('imageEditor')">Image Editor</button>
<button onclick="openPage('videoEditor')">Video Editor</button>
<button onclick="openPage('captionEditor')">Caption AI</button>
<button onclick="openPage('loginPage')">Login</button>
<button onclick="openPage('settings')">Settings</button>

</div>


<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="page active">

<h1 id="welcome">Hi Guest</h1>

<p>Create images, videos and captions.</p>

</div>


<!-- IMAGE EDITOR -->

<div id="imageEditor" class="page">

<div class="toolbar">

<button onclick="drawMode()">Draw</button>

<button onclick="addText()">Text</button>

<button onclick="addRectangle()">Rectangle</button>

<button onclick="uploadImage()">Upload</button>

<button onclick="removeBg()">Remove BG</button>

<button onclick="undo()">Undo</button>

<button onclick="redo()">Redo</button>

<button onclick="exportPNG()">Export</button>

</div>

<canvas id="canvas" width="900" height="500"></canvas>

<div id="layers"></div>

</div>


<!-- VIDEO EDITOR -->

<div id="videoEditor" class="page">

<input type="file" id="videoUpload">

<video id="videoPlayer" width="700" controls></video>

<div class="timeline">

<input type="range" id="timeline" min="0" max="100">

</div>

<div class="toolbar">

<button onclick="playVideo()">Play</button>

<button onclick="pauseVideo()">Pause</button>

<button onclick="addCaption()">Add Caption</button>

</div>

<div id="videoCaptions"></div>

</div>


<!-- CAPTION AI -->

<div id="captionEditor" class="page">

<input id="captionPrompt" placeholder="Describe caption">

<button onclick="generateCaption()">Generate Caption</button>

<textarea id="captionText"></textarea>

</div>


<!-- LOGIN -->

<div id="loginPage" class="page">

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>

</div>


<!-- SETTINGS -->

<div id="settings" class="page">

<button onclick="toggleTheme()">Dark / Light</button>
<button onclick="logout()">Logout</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
