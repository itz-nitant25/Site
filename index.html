<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ToolPilot AI</title>

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginPage">

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="signup()">Sign Up</button>

</div>


<div id="app">

<div class="sidebar">

<h3 id="username">User</h3>

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('editor')">Editor</button>
<button onclick="showPage('ai')">AI Image</button>
<button onclick="showPage('settings')">Settings</button>

</div>


<div class="main">

<div id="dashboard" class="page active">
<h1 id="welcome"></h1>
</div>


<div id="editor" class="page">

<div class="toolbar">

<button onclick="addText()">Text</button>
<button onclick="drawMode()">Draw</button>
<button onclick="uploadImage()">Upload</button>
<button onclick="grayscale()">Grayscale</button>
<button onclick="exportPNG()">Export PNG</button>

</div>

<canvas id="canvas" width="900" height="500"></canvas>

<div id="layers"></div>

</div>


<div id="ai" class="page">

<input id="prompt" placeholder="Describe image">
<button onclick="generateImage()">Generate</button>

<div id="result"></div>

</div>


<div id="settings" class="page">

<button onclick="toggleDark()">Dark Mode</button>
<button onclick="logout()">Logout</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
